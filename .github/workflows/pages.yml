name: Deploy Pages

on:
  workflow_dispatch:
  push:
    branches: [ main ]
    paths:
      - webxr_viewer/**
      - .github/workflows/pages.yml

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Setup Pages
        uses: actions/configure-pages@v6
        with:
          enablement: true

      - name: Upload site
        uses: actions/upload-pages-artifact@v4
        with:
          path: webxr_viewer

      - name: Deploy
        id: deployment
        uses: actions/deploy-pages@v5
